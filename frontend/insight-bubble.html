  <script src="https://cdn.tailwindcss.com"></script>

<body>
<div class="layout">
  <aside class="sidebar">
    <h1>矛盾纠纷预防和化解<br>智能体应用系统</h1>
    <a href="index.html">首页</a>

        <a class="active" href="insight-bubble.html">洞察统计</a>
  </aside>
  <main class="content">
    <section class="card insight-bubble-layout">
      <div class="insight-bubble-left">
        <div class="insight-bubble-head">
          <h2>上海各区案件数量</h2>
          <p>基于区域分布与洞察结果联动展示重点区域态势。</p>
        </div>
        <div id="shBubbleMapChart" class="sh-bubble-map-chart" aria-label="上海各区案件数量气泡地图"></div>
      </div>
      <div class="insight-bubble-right">
        <div class="insight-bubble-chat insight-chat-panel insight-chat-panel-fixed">
          <div class="insight-chat-head insight-chat-head-compact">
            <div>
              <h3>洞察分析</h3>
<!--              <p>结合区域统计与风险分布，持续展示最新分析结果。</p>-->
            </div>
            <div class="insight-chat-badge">实时分析</div>
          </div>
          <div id="insightChatLog" class="insight-chat-log insight-chat-log-modern"></div>
          <div class="insight-chat-row insight-chat-row-modern insight-chat-row-docked">
            <input id="insightQuestion" placeholder="请输入需要分析的问题，例如：哪个区案件最多？" />
            <button type="button" class="ui-btn ui-btn-primary" onclick="askDistrictInsight()">提交分析</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
