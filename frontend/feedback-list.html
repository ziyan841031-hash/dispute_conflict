<body>
<div class="layout">
  <aside class="sidebar">
    <h1>矛盾纠纷预防和化解<br>智能体应用系统</h1>
    <a href="index.html">首页</a>

        <a href="insight-bubble.html">洞察统计</a>
  </aside>
  <main class="content">
    <section class="card">
      <h2>客户评价建议列表</h2>
      <div class="table-wrap">
        <table class="cases-table">
          <thead>
          <tr>
            <th>ID</th><th>案件ID</th><th>案件编号</th><th>评价建议内容</th><th>提交时间</th><th class="action-col">操作</th>
          </tr>
          </thead>
          <tbody id="feedbackTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>


<div id="feedbackDetailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="feedbackDetailTitle">
  <div class="modal-content feedback-detail-modal-content">
    <div class="case-material-header">
      <h3 id="feedbackDetailTitle">详情</h3>
      <button type="button" onclick="closeFeedbackDetailModal()">关闭</button>
    </div>
    <pre id="feedbackDetailContent" class="feedback-detail-pre">-</pre>
  </div>
</div>


<script>
  function applyFeedbackPopupMode() {
    const isPopup = window !== window.top || new URLSearchParams(window.location.search).get('popup') === '1';
    if (!isPopup) {
      return;
    }
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) {
      sidebar.remove();
    }
    const layout = document.querySelector('.layout');
    if (layout) {
      layout.classList.add('feedback-popup-layout');
    }
    const content = document.querySelector('.content');
    if (content) {
      content.classList.add('feedback-popup-content');
    }
  }
  applyFeedbackPopupMode();
</script>
