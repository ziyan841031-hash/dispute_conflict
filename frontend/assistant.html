<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="components/ui/ui.css">
  <link rel="stylesheet" href="assistant-redesign.css">
</head>
<body class="assistant-shell-page">
<div class="layout">
  <aside class="sidebar">
    <h1 id="assistantSidebarTitle"></h1>
    <a id="assistantNavHome" href="index.html"></a>
    <a id="assistantNavTools" href="smart-tools.html"></a>
    <a id="assistantNavConsult" href="gov-consult.html"></a>
    <a id="assistantNavCases" class="active" href="cases.html"></a>
    <a id="assistantNavStats" href="stats.html"></a>
    <a id="assistantNavInsight" href="insight-bubble.html"></a>
  </aside>

  <main class="content assistant-page-content">
    <div class="assistant-shell">
      <header class="assistant-header ui-card">
        <div class="assistant-header-main">
          <div class="assistant-header-title">
            <p id="assistantEyebrow" class="assistant-eyebrow"></p>
            <h1 id="assistantPageTitle"></h1>
          </div>
          <div id="assistantProcessBar" class="assistant-process-bar"></div>
          <a id="assistantBackLink" class="ui-btn ui-btn-secondary" href="cases.html"></a>
        </div>
      </header>

      <section class="assistant-content-grid">
        <section class="assistant-chat-panel ui-card">
          <div class="assistant-panel-head">
            <div>
              <h2 id="assistantChatTitle"></h2>
              <p id="assistantChatDesc"></p>
            </div>
            <div id="assistantQuickActions" class="assistant-quick-actions"></div>
          </div>
          <div id="assistantChatList" class="assistant-chat-list"></div>
          <div class="assistant-chat-input-wrap">
            <textarea id="assistantChatInput" class="assistant-chat-input" rows="1"></textarea>
            <button id="assistantChatSendBtn" type="button" class="ui-btn ui-btn-primary"></button>
          </div>
        </section>

        <aside class="assistant-side-panel ui-card">
          <div class="assistant-panel-head assistant-side-head">
            <div>
              <h2 id="assistantInfoTitle"></h2>
              <p id="assistantInfoDesc"></p>
            </div>
          </div>

          <div id="assistantInfoSummary" class="assistant-info-summary"></div>

          <section id="assistantSideModules" class="assistant-trace-section">
            <div class="assistant-side-tabs">
              <button type="button" class="assistant-side-tab is-active" data-side-tab="detail">
                <span id="assistantDetailTitle"></span>
              </button>
              <button type="button" class="assistant-side-tab" data-side-tab="trace">
                <span id="assistantTraceTitle"></span>
              </button>
              <button type="button" class="assistant-side-tab" data-side-tab="files">
                <span id="assistantFilesTitle"></span>
              </button>
            </div>
            <div id="assistantDetailPanel" class="assistant-side-panel-body is-active">
              <div id="assistantCaseDetailContent" class="assistant-detail-panel"></div>
            </div>
            <div id="assistantTracePanel" class="assistant-side-panel-body">
              <div id="assistantTraceList" class="assistant-trace-list"></div>
            </div>
            <div id="assistantFilePanel" class="assistant-side-panel-body">
              <div id="assistantFileList" class="assistant-file-list"></div>
            </div>
          </section>
        </aside>
      </section>
    </div>
  </main>
</div>

<div id="assistantModal" class="assistant-modal hidden" aria-hidden="true">
  <div class="assistant-modal-backdrop"></div>
  <div class="assistant-modal-dialog ui-card">
    <div class="assistant-modal-head">
      <h3 id="assistantModalTitle"></h3>
      <button id="assistantModalCloseBtn" type="button" class="assistant-modal-close"></button>
    </div>
    <div id="assistantModalBody" class="assistant-modal-body"></div>
  </div>
</div>

<div id="assistantInitLoading" class="assistant-init-loading hidden" aria-hidden="true">
  <div class="assistant-init-loading-backdrop"></div>
  <div class="assistant-init-loading-card">
    <div class="assistant-init-loading-spinner"></div>
    <div id="assistantInitLoadingText" class="assistant-init-loading-text"></div>
  </div>
</div>

<script src="./javascript/config.js"></script>
<script src="./javascript/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
<script src="./javascript/assistant-redesign.js"></script>
</body>
</html>
